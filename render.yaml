services:
  - type: web
    name: cal-code
    env: node
    buildCommand: cd server && npm install && npm run build
    startCommand: cd server && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cal-code-db
          property: connectionString
      - key: NODE_ENV
        value: production

databases:
  - name: cal-code-db
